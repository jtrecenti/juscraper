project:
  type: website
  output-dir: _site

encoding: utf8

lang: pt

website:
  title: "juscraper"
  page-navigation: true
  site-url: https://jtrecenti.github.io/juscraper/
  description: "Raspador de tribunais e outros sistemas relacionados ao poder judiciário."

  repo-url: https://github.com/jtrecenti/juscraper/
  repo-actions: [issue, edit]
  repo-subdir: docs

  navbar:
    background: "#005f73"
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Referência da API"
        href: reference/index.qmd
    right:
      - icon: github
        href: https://github.com/jtrecenti/juscraper
        aria-label: GitHub repository

  page-footer:
    left: |
      Copyright 2025, Julio Trecenti

  sidebar:
    - id: "juscraper"
      title: "Documentação"
      style: "floating"
      contents:
        - href: index.qmd
          text: "Home"
        - href: reference/index.qmd
          text: "Referência da API"
        - section: "Exemplos"
          contents:
            - section: "Tribunais"
              contents:
                - href: notebooks/tjac.ipynb
                  text: "TJAC"
                - href: notebooks/tjal.ipynb
                  text: "TJAL"
                - href: notebooks/tjam.ipynb
                  text: "TJAM"
                - href: notebooks/tjap.ipynb
                  text: "TJAP"
                - href: notebooks/tjce.ipynb
                  text: "TJCE"
                - href: notebooks/tjba.ipynb
                  text: "TJBA"
                - href: notebooks/tjdft.ipynb
                  text: "TJDFT"
                - href: notebooks/tjmt.ipynb
                  text: "TJMT"
                - href: notebooks/tjpa.ipynb
                  text: "TJPA"
                - href: notebooks/tjpb.ipynb
                  text: "TJPB"
                - href: notebooks/tjpe.ipynb
                  text: "TJPE"
                - href: notebooks/tjpi.ipynb
                  text: "TJPI"
                - href: notebooks/tjpr.ipynb
                  text: "TJPR"
                - href: notebooks/tjrn.ipynb
                  text: "TJRN"
                - href: notebooks/tjro.ipynb
                  text: "TJRO"
                - href: notebooks/tjrr.ipynb
                  text: "TJRR"
                - href: notebooks/tjrs.ipynb
                  text: "TJRS"
                - href: notebooks/tjsc.ipynb
                  text: "TJSC"
                - href: notebooks/tjes.ipynb
                  text: "TJES"
                - href: notebooks/tjto.ipynb
                  text: "TJTO"
